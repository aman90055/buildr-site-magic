        </div>
      </div>
    </div>
    <style>
      @keyframes splashFadeIn{from{opacity:0;transform:scale(0.9)translateY(20px)}to{opacity:1;transform:scale(1)translateY(0)}}
      @keyframes splashPulse{0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(99,102,241,0.4)}50%{transform:scale(1.05);box-shadow:0 0 40px rgba(99,102,241,0.6)}}
      @keyframes splashLoader{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
    </style>
    <script>
      (function(){
        function hideSplash(){
          var s=document.getElementById('splash-screen');
          if(!s) return;
          s.style.opacity='0';
          s.style.visibility='hidden';
          setTimeout(function(){ s && s.remove(); },500);
        }
        // Hide once React mounts (root has children) OR after 2.5s max — whichever first.
        var maxWait=setTimeout(hideSplash,1500);
        var iv=setInterval(function(){
          var root=document.getElementById('root');
          if(root && root.childElementCount>0){
            clearInterval(iv);
            clearTimeout(maxWait);
            setTimeout(hideSplash,150);
          }
        },100);
        // Hard safety net
        window.addEventListener('load',function(){ setTimeout(hideSplash,1500); });
      })();
    </script>

    <div id="root"></div>
